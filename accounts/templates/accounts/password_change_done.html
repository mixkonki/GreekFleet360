<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Επιτυχής Αλλαγή - GreekFleet 360</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body class="bg-gradient-to-br from-blue-500 to-blue-700 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
        <!-- Success Icon -->
        <div class="text-center mb-8">
            <div class="inline-block bg-green-100 rounded-full p-4 mb-4">
                <i class="fas fa-check-circle text-4xl text-green-600"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">Επιτυχής Αλλαγή</h1>
            <p class="text-gray-600 mt-4 leading-relaxed">
                Ο κωδικός σας άλλαξε επιτυχώς.
            </p>
        </div>
        
        <!-- Actions -->
        <div class="space-y-3">
            <a href="{% url 'accounts:me' %}" class="block w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition-colors text-center">
                <i class="fas fa-user-circle mr-2"></i>
                Ο Λογαριασμός μου
            </a>
            <a href="{% url 'web:dashboard' %}" class="block w-full bg-gray-600 text-white py-3 rounded-lg font-semibold hover:bg-gray-700 transition-colors text-center">
                <i class="fas fa-home mr-2"></i>
                Dashboard
            </a>
        </div>
        
        <!-- Footer -->
        <div class="mt-8 pt-6 border-t border-gray-200 text-center">
            <p class="text-xs text-gray-500">
                © 2026 GreekFleet 360. All rights reserved.
            </p>
        </div>
    </div>
</body>
</html>
