<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Εστάλη - GreekFleet 360</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body class="bg-gradient-to-br from-blue-500 to-blue-700 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
        <!-- Success Icon -->
        <div class="text-center mb-8">
            <div class="inline-block bg-green-100 rounded-full p-4 mb-4">
                <i class="fas fa-check-circle text-4xl text-green-600"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">Email Εστάλη</h1>
            <p class="text-gray-600 mt-4 leading-relaxed">
                Εάν υπάρχει λογαριασμός με αυτό το email, θα λάβετε οδηγίες για την επαναφορά του κωδικού σας.
            </p>
            <p class="text-gray-600 mt-2 text-sm">
                Ελέγξτε τα εισερχόμενα και τον φάκελο spam.
            </p>
        </div>
        
        <!-- Back to Login -->
        <div class="text-center">
            <a href="{% url 'accounts:login' %}" class="inline-block w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition-colors">
                <i class="fas fa-arrow-left mr-2"></i>
                Επιστροφή στη Σύνδεση
            </a>
        </div>
        
        <!-- Footer -->
        <div class="mt-8 pt-6 border-t border-gray-200 text-center">
            <p class="text-xs text-gray-500">
                © 2026 GreekFleet 360. All rights reserved.
            </p>
        </div>
    </div>
</body>
</html>
